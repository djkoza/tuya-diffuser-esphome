name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Python syntax
        run: python -m py_compile custom_components/tuya_diffuser_esphome/*.py

      - name: Validate frontend syntax
        run: node --check custom_components/tuya_diffuser_esphome/frontend/tuya-diffuser-esphome-card.js
